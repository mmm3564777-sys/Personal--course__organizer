<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Mohamed Maher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="brand">MOHAMED</div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">My Courses</a></li>
                    <li><a href="add-course.html">Add Courses</a></li>
                    <li><a href="contact.html">Contact US</a></li>
                </ul>
            </nav>
        </header>

        <div class="glass-card">
            <h2 style="margin-bottom: 20px;">Add Course</h2>
            <form>
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter course name">
                </div>
                <div class="form-group">
                    <label>Instructor</label>
                    <input type="text" placeholder="Enter instructor name">
                </div>
                <div class="form-group">
                    <label>Schedule</label>
                    <input type="text" placeholder="e.g. Sun & Tue - 10:00 AM">
                </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="text" placeholder="Enter credit hours">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea placeholder="Any additional notes..."></textarea>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
